<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
background:#004B8D;
padding:18px;
}

.logo{
height:40px;
display:block;
}

.container{
max-width:800px;
margin:auto;
padding:50px 20px;
flex:1;
}

.card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
max-width:500px;
margin:auto;
}

.certificate{
width:100%;
display:block;
border-radius:12px;
}

footer{
background:#005A9C;
color:#fff;
margin-top:auto;
padding:25px 15px;
}

.footer-top{
display:flex;
justify-content:space-between;
align-items:center;
text-align:center;
}

.item{
flex:1;
text-decoration:none;
color:#fff;
padding:10px;
display:block;
}
.icon{
width:55px;
height:55px;
border:2px solid #fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
margin:0 auto 10px;
}

.item h3{
font-size:18px;
margin-bottom:5px;
font-weight:bold;
word-break:break-word;
}

.item p{
font-size:13px;
}

.divider{
width:1px;
height:80px;
background:rgba(255,255,255,.4);
}

footer hr{
border:none;
height:1px;
background:rgba(255,255,255,.3);
margin:20px 0;
}

.copy{
text-align:center;
font-size:13px;
line-height:1.8;
}

.copy a{
color:#fff;
text-decoration:none;
margin:0 5px;
}

@media(max-width:768px){

.footer-top{
flex-direction:row;
}

.item{
padding:5px;
}

.icon{
width:42px;
height:42px;
font-size:18px;
}
.item h3{
font-size:12px;
}

.item p{
font-size:10px;
}

.divider{
height:60px;
}

.copy{
font-size:11px;
}

}

</style>

</head>

<body>

<header>

<img src="0003.png.png" class="logo">

</header>

<div class="container">

<div class="card">

<img src="1633265936658.jpg" class="certificate">

</div>

</div>

<footer>

<div class="footer-top">

<a class="item" href="tel:920024555">

<div class="icon">📞</div>

<h3>920024555</h3>

<p>Call Us</p>

</a>

<div class="divider"></div>

<a class="item" href="mailto:info@es.chamber.org.sa">

<div class="icon">✉️</div>

<h3>info@es.chamber.org.sa</h3>

<p>Email Us</p>

</a> <div class="divider"></div>

<a class="item" href="https://es.chamber.org.sa" target="_blank">

<div class="icon">🌐</div>

<h3>es.chamber.org.sa</h3>

<p>Visit Website</p>

</a>

</div>

<hr>

<div class="copy">

© Copyright Asharqia Chamber

<br><br>

<a href="#">العربية</a> |
<a href="#">English (US)</a>

</div>  </footer>

</body>

</html>
