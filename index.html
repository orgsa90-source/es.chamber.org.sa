<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* Splash Screen */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
transition:opacity .8s;
}

.glow{
width:80px;
height:80px;
border-radius:60%;
display:flex;
justify-content:center;
align-items:center;
animation:pulse 5s infinite;
}

.glow img{
width:50px;
height:auto;
}

@keyframes pulse{
/* ===== Premium Splash Effect ===== */

#splash{
background:#ffffff;
overflow:hidden;
}

.logo-box{
position:relative;
width:110px;
height:110px;
border-radius:50%;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
box-shadow:
0 0 25px #00bfff,
0 0 60px #00bfff,
0 0 100px #4facfe;
animation:logoPulse 2.5s ease-in-out infinite;
}

.logo-box img{
width:70px;
height:auto;
}

.sun-ring{
position:absolute;
border-radius:50%;
border:3px solid rgba(0,170,255,.35);
animation:rotateSun linear infinite;
}

.ring1{
width:170px;
height:170px;
animation-duration:6s;
}

.ring2{
width:220px;
height:220px;
animation-duration:10s;
animation-direction:reverse;
}

.ring3{
width:270px;
height:270px;
animation-duration:15s;
}

@keyframes rotateSun{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

@keyframes logoPulse{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

}
0%{
box-shadow:0 0 15px rgba(0,91,156,.3);
transform:scale(1);
}

50%{
box-shadow:0 0 70px rgba(0,91,156,1);
transform:scale(1.08);
}

100%{
box-shadow:0 0 15px rgba(0,91,156,.3);
transform:scale(1);
}

}

header{
background:#004B8D;
padding:2px;
}

.logo{
height:60px;
display:block;
}

.container{
max-width:300px;
margin:auto;
padding:20px 10px;
flex:1;
}

.card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
max-width:500px;
margin:auto;
}

.certificate{
width:100%;
display:block;
border-radius:12px;
}
footer{
margin-top:auto;
background:#005A9C;
color:#fff;
padding:2px;
text-align:center;
}

.buttons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:5px;
margin-bottom:15px;
}

.btn{
display:inline-block;
padding:4px 9px;
background:transparent;
border:none;
border-radius:12px;
color:#fff;
text-decoration:none;
font-weight:bold;
font-size:7px;
box-shadow:0 3px 8px rgba(0,0,0,.2);
transition:.3s;
}

.btn:hover{
background:#fff;
color:#005A9C;
}

.copy{
margin-top:5px;
font-size:5px;
}
/* ===== Sun Rays ===== */

.sun-ring::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:16px;
height:16px;
background:#00bfff;
border-radius:50%;
transform:translate(-50%,-50%) translateY(-85px);
box-shadow:
0 0 15px #00bfff,
0 0 30px #00bfff,
0 0 45px #4facfe;
}

.ring2::before{
transform:translate(-50%,-50%) translateY(-110px);
}

.ring3::before{
transform:translate(-50%,-50%) translateY(-135px);
}

.logo-box::after{
content:"";
position:absolute;
inset:-18px;
border-radius:50%;
border:2px solid rgba(79,172,254,.4);
animation:logoWave 2.5s linear infinite;
}

@keyframes logoWave{

0%{
transform:scale(1);
opacity:1;
}

100%{
transform:scale(1.35);
opacity:0;
}

}
</style>

</head>

<body>

<div id="splash">

    <div class="sun-ring ring1"></div>
    <div class="sun-ring ring2"></div>
    <div class="sun-ring ring3"></div>

    <div class="logo-box">
        <img src="logo-blue.png" alt="Logo">
    </div>

</div>

<header>

<img src="0003.png" class="logo">

</header>

<div class="container">

<div class="card">

<img src="1633265936658.jpg" class="certificate">

</div>

</div>
<footer>

<div class="buttons">

<a class="btn" href="tel:920024555">
📞920024555 Call
</a>

<a class="btn" href="mailto:info@es.chamber.org.sa">
📧 Email
</a>

<a class="btn" href="https://es.chamber.org.sa">
🌐 Website
</a>

</div>

<div class="copy">

© Copyright Asharqia Chamber

<br><br>

العربية | English (US)

</div>

</footer>

<script>

window.addEventListener("load", function(){

setTimeout(function(){

document.getElementById("splash").style.opacity="0";

setTimeout(function(){

document.getElementById("splash").style.display="none";

},100);

},7000);

});

</script>
</body>

</html>
