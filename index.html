<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
color:#333;
}

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.loader{
width:180px;
height:180px;
border-radius:50%;
background:linear-gradient(135deg,#2458d3,#00a67c);
display:flex;
justify-content:center;
align-items:center;
position:relative;
animation:pulse 2s infinite;
overflow:hidden;
}

.loader::before{
content:"";
position:absolute;
width:90px;
height:90px;
border-radius:50%;
background:linear-gradient(135deg,#2b6cff,#00d084);
right:28px;
top:45px;
opacity:.45;
}

.loader img{
width:95px;
position:relative;
z-index:2;
}

@keyframes pulse{
0%{box-shadow:0 0 10px rgba(0,91,156,.3);}
50%{box-shadow:0 0 35px rgba(0,91,156,.9);}
100%{box-shadow:0 0 10px rgba(0,91,156,.3);}
}

header{
background:#005A9C;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.topbar{
max-width:450px;
margin:auto;
padding:12px;
text-align:center;
}

.logo{
height:55px;
}

.container{
max-width:420px;
margin:25px auto;
padding:15px;
}

.card{
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.title{
text-align:center;
margin-bottom:20px;
}

.title h2{
color:#005A9C;
font-size:24px;
margin-bottom:8px;
}

.title p{
font-size:14px;
color:#666;
}

.status{
width:170px;
margin:0 auto 20px;
padding:10px;
border-radius:30px;
text-align:center;
font-weight:600;
}

.verified{
background:#E9F8EF;
color:#198754;
}

.certificate img{
width:100%;
border-radius:12px;
border:1px solid #ddd;
}

.info{
margin-top:20px;
}

.item{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #ececec;
}

.item span{
color:#666;
}

.green{
color:#198754;
}
.qr-section{
margin-top:25px;
text-align:center;
}

.qr-section h3{
color:#005A9C;
font-size:18px;
margin-bottom:12px;
}

.qr{
width:140px;
height:140px;
padding:8px;
background:#fff;
border:1px solid #ddd;
border-radius:12px;
transition:.3s;
}

.qr:hover{
transform:scale(1.05);
}

.scan-text{
font-size:13px;
color:#666;
margin-top:10px;
}

.actions{
display:flex;
justify-content:space-between;
gap:10px;
margin-top:25px;
}

.actions button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#005A9C;
color:#fff;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.actions button:hover{
background:#003d6b;
transform:translateY(-2px);
}

.actions button i{
margin-right:6px;
}

.footer-content{
text-align:center;
padding:20px;
background:#005A9C;
color:#fff;
margin-top:30px;
font-size:14px;
}

.footer-content p{
margin:5px 0;
}

@media(max-width:480px){

.container{
padding:12px;
}

.card{
padding:16px;
border-radius:15px;
}

.title h2{
font-size:20px;
}

.item{
font-size:14px;
}

.actions{
flex-direction:column;
}

.actions button{
width:100%;
}

.qr{
width:120px;
height:120px;
}

}

</style>

</head>

<body>

<div id="splash">
<div class="loader">
<img src="logo-blue.png" alt="Logo">
</div>
</div>

<header>
<div class="topbar">
<img src="0003.png" class="logo">
</div>
</header>

<main class="container">

<div class="card">

<div class="title">
<h2>Certificate Verification</h2>
<p>This certificate has been verified successfully.</p>
</div>

<div class="status verified">
<i class="fa-solid fa-circle-check"></i>
Verified
</div>

<div class="certificate">
<img src="1633265936658.jpg" alt="Certificate">
</div>

<div class="info">

<div class="item">
<span>Certificate No</span>
<strong>000145879</strong>
</div>

<div class="item">
<span>Status</span>
<strong class="green">Verified</strong>
</div>

</div>

<div class="qr-section">

<h3>QR Verification</h3>

<img src="qr.png" class="qr">

<p class="scan-text">
Scan this QR code to verify this certificate.
</p>

</div>

<div class="actions">
<button onclick="openCertificate()">
<i class="fa-solid fa-folder-open"></i> Open
</button>

<button onclick="shareCertificate()">
<i class="fa-solid fa-share-nodes"></i> Share
</button>

<button onclick="copyCertificate()">
<i class="fa-solid fa-copy"></i> Copy
</button>
</div>

</div>

</main>
<footer>
<div class="footer-content">
<p>© 2026 Asharqia Chamber</p>
<p>العربية | English</p>
</div>
</footer>

<script>

// Splash Screen
window.addEventListener("load", () => {

setTimeout(() => {

const splash = document.getElementById("splash");

if(splash){

splash.style.opacity = "0";
splash.style.transition = "0.5s";

setTimeout(()=>{
splash.style.display="none";
},1000);

}

},01);

});

// Open Certificate
function openCertificate(){
window.open("1633265936658.jpg","_blank");
}

// Copy
function copyCertificate(){

const details = `Certificate Verification

Certificate No: 000145879
`;

navigator.clipboard.writeText(details);
alert("Certificate details copied.");

}

// Share
async function shareCertificate(){

if(navigator.share){

try{

await navigator.share({
title:"Certificate Verification",
text:"Verified Certificate",
url:window.location.href
});

}catch(e){}

}else{

navigator.clipboard.writeText(window.location.href);
alert("Link copied.");

}

}

// Card Animation
document.addEventListener("DOMContentLoaded",()=>{

const card=document.querySelector(".card");

card.style.opacity="0";
card.style.transform="translateY(25px)";

setTimeout(()=>{

card.style.transition=".6s";
card.style.opacity="1";
card.style.transform="translateY(0)";

},250);

});

// Button Animation
document.querySelectorAll(".actions button").forEach(btn=>{

btn.addEventListener("click",()=>{

btn.style.transform="scale(.95)";

setTimeout(()=>{

btn.style.transform="scale(1)";

},150);

});

});

</script>

</body>
</html>
