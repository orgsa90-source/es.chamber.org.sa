<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* Splash Screen */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
transition:opacity .8s;
}

.glow{
width:140px;
height:140px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
animation:pulse 2.5s ease-in-out infinite;
}

.glow::before{
content:"";
position:absolute;
width:260px;
height:260px;
border-radius:50%;
background:radial-gradient(circle,
rgba(60,120,255,.35) 0%,
rgba(60,120,255,.18) 35%,
rgba(60,120,255,.08) 60%,
transparent 80%);
filter:blur(18px);
z-index:0;
}

.glow img{
width:85px;
height:auto;
position:relative;
z-index:2;
}

@keyframes pulse{
0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}
}

}

header{
background:#004B8D;
padding:2px;
}

.logo{
height:60px;
display:block;
}

.container{
max-width:300px;
margin:auto;
padding:20px 10px;
flex:1;
}

.card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
max-width:500px;
margin:auto;
}

.certificate{
width:100%;
display:block;
border-radius:12px;
}
footer{
margin-top:auto;
background:#005A9C;
color:#fff;
padding:2px;
text-align:center;
}

.buttons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:5px;
margin-bottom:15px;
}

.btn{
display:inline-block;
padding:4px 9px;
background:transparent;
border:none;
border-radius:12px;
color:#fff;
text-decoration:none;
font-weight:bold;
font-size:7px;
box-shadow:0 3px 8px rgba(0,0,0,.2);
transition:.3s;
}

.btn:hover{
background:#fff;
color:#005A9C;
}

.copy{
margin-top:5px;
font-size:5px;
}

</style>

</head>

<body>

<div id="splash">
<div class="glow">
<img src="logo-blue.png.png" alt="Logo">
</div>
</div>

<header>

<img src="0003.png.png" class="logo">

</header>

<div class="container">

<div class="card">

<img src="1633265936658.jpg" class="certificate">

</div>

</div>
<footer>

<div class="buttons">

<a class="btn" href="tel:920024555">
📞920024555 Call
</a>

<a class="btn" href="mailto:info@es.chamber.org.sa">
📧 Email
</a>

<a class="btn" href="https://es.chamber.org.sa">
🌐 Website
</a>

</div>

<div class="copy">

© Copyright Asharqia Chamber

<br><br>

العربية | English (US)

</div>

</footer>

<script>

window.addEventListener("load", function(){

setTimeout(function(){

document.getElementById("splash").style.opacity="0";

setTimeout(function(){

document.getElementById("splash").style.display="none";

},100);

},7000);

});

</script>
</body>

</html>
